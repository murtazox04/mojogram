# Reverse proxy that terminates TLS and load-balances Telegram webhook POSTs
# across N single-connection mojogram processes. Round-robin via Docker DNS.
events {}

http {
    upstream mojogram {
        # `bot` is the compose service name; Docker DNS returns all replicas.
        server bot:8080;
    }

    server {
        listen 443 ssl;
        server_name _;

        # Telegram requires a valid cert; use your real cert or Let's Encrypt.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        location / {
            proxy_pass http://mojogram;
            proxy_set_header Host $host;
            proxy_read_timeout 30s;
        }
    }
}
